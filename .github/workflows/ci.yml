name: Complete CI/CD Pipeline with Docker

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Add this to handle Node.js deprecation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # CI Checks Job
  ci-checks:
    name: CI Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: 18

      - name: Cache dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint
        continue-on-error: false

      - name: Run Tests
        run: npm test
        continue-on-error: false

      - name: Security Scan
        run: npm audit --audit-level=high
        continue-on-error: false

  # SonarCloud Analysis Job
  sonarcloud-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: ci-checks
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@e44258b109568baa0df60ed515909fc6c72cba92  # v2.3.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=mpusunuri
            -Dsonar.projectKey=mpusunuri_login-api-ci-project
            -Dsonar.projectName=login-api-ci-project
            -Dsonar.coverage.exclusions=**/*.test.js,**/*.spec.js

   # Docker Build and Push Job
  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [ci-checks, sonarcloud-analysis]
    if: github.event_name == 'push'  # Modified for testing
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349  # v3.0.0 (Correct SHA)

      - name: Login to DockerHub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.0.0 (Correct SHA)
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81  # v5.0.0 (Correct SHA)
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/login-api
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09  # v5.0.0 (SHA to be updated)
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Docker image built and pushed successfully!"

      - name: Deployment Info
        run: |
          echo "Docker image built and pushed successfully!"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/login-api:latest"
          echo "SHA: ${{ github.sha }}"
          echo ""
          echo "To run this image:"
          echo "docker pull ${{ secrets.DOCKER_USERNAME }}/login-api:latest"
          echo "docker run -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/login-api:latest"