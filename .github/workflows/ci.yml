name: Complete CI/CD Pipeline with Docker

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  # CI Checks Job
  ci-checks:
    name: CI Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: 18

      - name: Cache dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint
        continue-on-error: false

      - name: Run Tests
        run: npm test
        continue-on-error: false

      - name: Security Scan
        run: npm audit --audit-level=high
        continue-on-error: false

  # SonarCloud Analysis Job
  sonarcloud-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: ci-checks
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@e44258b109568baa0df60ed515909fc6c72cba92  # v2.3.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=mpusunuri
            -Dsonar.projectKey=mpusunuri_login-api-ci-project
            -Dsonar.projectName=login-api-ci-project
            -Dsonar.coverage.exclusions=**/*.test.js,**/*.spec.js

  #  NEW: Docker Build and Push Job
  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [ci-checks, sonarcloud-analysis]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226  # v3.0.0

      - name: Login to DockerHub
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d  # v3.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934  # v5.0.0
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/login-api
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857cf09b  # v5.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d306b  # v0.29.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/login-api:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  # NEW: Deployment Job (Optional)
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to Server
        run: |
          echo " Docker image built and pushed successfully!"
          echo " Image: ${{ secrets.DOCKER_USERNAME }}/login-api:latest"
          echo " SHA: ${{ github.sha }}"
          echo ""
          echo " Image Tags:"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/login-api:latest"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/login-api:${{ github.sha }}"
          echo ""
          echo " To run this image locally:"
          echo "  docker pull ${{ secrets.DOCKER_USERNAME }}/login-api:latest"
          echo "  docker run -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/login-api:latest"
          echo ""
          echo " To scan for vulnerabilities:"
          echo "  docker scout quickview ${{ secrets.DOCKER_USERNAME }}/login-api:latest"

      - name: Send Deployment Notification
        run: |
          echo "Deployment complete! 🎉"
          # Add webhook or email notification here if needed